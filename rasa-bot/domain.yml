  #dari file faq
  utter_jawab_cuti_akademik:
    - text: |
        Prosedur Cuti Akademik (maks. 3 hari kerja):
        1) Unduh, isi, & tanda tangani Form Cuti + unggah via SIAP
        2) Persetujuan Ketua Prodi
        3) Disposisi Dekan → Subbag Akademik
        4) Subbag cek kelengkapan & proses
        5) Tanda tangan Dekan
        6) Penomoran oleh Subbag SDM
        7) Ambil Surat Izin Dekan di loket akademik
  utter_jawab_legalisir:
    - text: |
        Legalisir Ijazah/Transkrip (maks. 3 hari kerja):
        1) Serahkan fotokopi + asli ke Subbag Akademik
        2) Petugas cek keabsahan & cap
        3) Supervisor paraf
        4) Dekan/Wadek tanda tangan
        5) Stempel fakultas
        6) Ambil legalisir (bawa asli & tanda tangan buku)
  utter_jawab_proposal_organisasi:
    - text: |
        Pengajuan Proposal Ormawa (maks. 3 hari kerja):
        1) Serahkan proposal ke petugas kemahasiswaan & Supervisor (registrasi/ruang)
        2) Supervisor verifikasi & paraf
        3) Wadek evaluasi substansi
        4) Pengesahan Wadek
        5) Ambil proposal yang disetujui
  utter_jawab_rekomendasi_beasiswa:
    - text: |
        Rekomendasi Beasiswa (±3 hari 45 menit):
        1) Isi formulir rekomendasi → ke Subbag Akademik
        2) BAK teliti & verifikasi
        3) BAK beri paraf & nomor surat
        4) Wadek tanda tangan
        5) Ambil surat di BAK (dicatat bukti pengambilan)
  utter_jawab_irs:
    - text: |
        Pengisian IRS (Isian Rencana Studi):
        1) Bayar UKT (BNI/Mandiri/BTN/BRI)
        2) Her-registrasi online via SIAP
        3) Isi/perbaiki/cetak IRS sementara via SIAP
        4) Konsultasi PA (mata kuliah)
        5) PA menyetujui IRS di SIAP
        6) Cek IRS final di SIAP
  utter_jawab_izin_aktif_kuliah_setelah_cuti:
    - text: |
        Izin Aktif Kuliah Setelah Cuti:
        1) Bawa surat izin cuti ke Kaprodi & Subbag Akademik
        2) Registrasi online (SSO)
        3) Status aktif sebagai Peserta Kuliah
  utter_jawab_izin_terlambat_bayar_ukt:
    - text: |
        Izin Terlambat Bayar UKT (maks. 3 hari kerja):
        1) Isi & tanda tangani Form Permohonan (lampiran lengkap)
        2) TTD Dosen Wali + persetujuan Kaprodi
        3) Serahkan ke Supervisor SDM (verifikasi & paraf)
        4) Proses oleh Wadek SDM; ditandatangani
        5) Subbag SDM memproses surat
        6) Bawa ke WR II → disposisi ke Direktorat Keuangan
        7) Bendahara membuat kanal pembayaran
        8) Lakukan pembayaran UKT
  utter_jawab_link_form:
    - text: |
        Link Formulir:
        • Form Cuti Akademik:
          https://drive.google.com/file/d/1miPHNvRj6XO6LEhFCiC_QXcMtynCPWR2/edit
        • Form Rekomendasi Beasiswa:
          https://drive.google.com/file/d/18f_nbpXHbElgRNoplDFQVNYGGDkFxBTT/view
        • Form Keterlambatan Pembayaran UKT:
          https://drive.google.com/file/d/1o7hogihjZsFTB_V27JU1OfNGBuI2Sr55/
  utter_jawab_waktu_proses:
    - text: |
        SLA Layanan Akademik:
        • Cuti Akademik — maks. 3 hari kerja
        • Legalisir — maks. 3 hari kerja
        • Proposal Ormawa — maks. 3 hari kerja
        • Rekomendasi Beasiswa — ±3 hari 45 menit
        • Keterlambatan UKT — maks. 3 hari kerja
        • Pengisian IRS — maks. 3 hari kerja
        • Aktif Setelah Cuti — ±15 menit
  utter_layanan_akademik:
    - text: |
        Layanan Akademik yang Tersedia:
        • Cuti Akademik
        • Legalisir Ijazah & Transkrip
        • Proposal Kegiatan Organisasi
        • Rekomendasi Beasiswa
        • Pengisian IRS (Isian Rencana Studi)
        • Izin Aktif Setelah Cuti
        • Izin Keterlambatan Bayar UKT
  utter_kontak:
    - text: |
        Kontak Layanan Akademik FSM:
        • Subbag Akademik & Kemahasiswaan
        • Telp: (024) 747 4754
        • Email: akademikfsm@live.undip.ac.id
        Jam layanan: Senin–Jumat 08.00–16.00 WIB
  utter_jadwal:
    - text: |
        Jadwal Layanan:
        • Jam Operasional: Senin–Jumat, 08.00–16.00 WIB
        • Lokasi: Gedung Acintya Prasada Lt.1, FSM UNDIP
        • Hari Libur: Mengikuti kalender akademik UNDIP

  utter_diluar_scope:
