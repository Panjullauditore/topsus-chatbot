  utter_pembuka:
    - text: "Hai! 👋 Saya chatbot layanan akademik FSM. Ada yang bisa kubantu hari ini?"
    - text: "Selamat datang! Aku siap bantu info layanan akademik 😊."
    - text: "Halo! Silakan tanya seputar layanan akademik yang kamu butuhkan."

  utter_penutup:
    - text: "Sampai jumpa! Semoga informasinya membantu ya. 🙌"
    - text: "Makasih ya! Jangan ragu tanya lagi kalau perlu."
    - text: "Sampai ketemu lagi—semoga urusan akademiknya lancar!"

  utter_terima_kasih:
    - text: "Sama-sama! Senang bisa bantu. Ada lagi yang bisa kubantu?"
    - text: "Dengan senang hati! Kalau ada pertanyaan lain, tinggal tanya ya. 🙂"
    - text: "Terima kasih kembali! Butuh info lain?"

