        Maaf, aku belum bisa menjawab pertanyaan tersebut. Silakan hubungi bagian terkait:
        📧 Layanan Akademik: akademikfsm@live.undip.ac.id
        📧 Layanan Mawa: mawafsm@live.undip.ac.id
        📍 Gedung Acintya Prasada Lt.1, FSM UNDIP.
        📞 Telp: 024-7474754

