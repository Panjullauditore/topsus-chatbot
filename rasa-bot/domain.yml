    type: any
    influence_conversation: false
    initial_value: null
    mappings:
      - type: from_text

  last_normalized_query:
    type: text
    influence_conversation: false
    initial_value: null
    mappings:
      - type: from_text
  last_is_match:
    type: text
    influence_conversation: false
    initial_value: null
    mappings:
      - type: from_text

actions:
  - action_smart_answer


